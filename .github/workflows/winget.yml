name: Publish to WinGet

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  winget:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare manifests
        id: manifest
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          function New-LocaleFiles([string]$dir, [string]$packageVersion, [string]$releaseTag) {
            Copy-Item "winget/Provix.Provix/1.0.2/Provix.Provix.locale.en-US.yaml" "$dir/Provix.Provix.locale.en-US.yaml"
            Copy-Item "winget/Provix.Provix/1.0.2/Provix.Provix.locale.ru-RU.yaml" "$dir/Provix.Provix.locale.ru-RU.yaml"
            foreach ($file in @("$dir/Provix.Provix.locale.en-US.yaml", "$dir/Provix.Provix.locale.ru-RU.yaml")) {
              (Get-Content $file -Raw) `
                -replace 'PackageVersion: .*', "PackageVersion: $packageVersion" `
                -replace 'releases/tag/[^\r\n]+', "releases/tag/$releaseTag" |
                Set-Content $file
            }
          }

          if ($env:RELEASE_TAG) {
            $tag = $env:RELEASE_TAG -replace '^v', ''
            $release = Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/releases/tags/$($env:RELEASE_TAG)" -Headers @{ "User-Agent" = "provix-winget" }
            $asset = $release.assets | Where-Object { $_.name -like 'Provix-Setup-*.exe' } | Select-Object -First 1
            if (-not $asset) { throw "Provix-Setup-*.exe asset not found in release $($env:RELEASE_TAG)" }

            $installerVersion = if ($asset.name -match 'Provix-Setup-(.+)\.exe') { $Matches[1] } else { $tag }
            $dir = "winget-generated/Provix.Provix/$tag"
            New-Item -ItemType Directory -Force -Path $dir | Out-Null

            Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $asset.name
            $sha = (Get-FileHash $asset.name -Algorithm SHA256).Hash.ToLowerInvariant()

            @"
          # yaml-language-server: `$schema=https://aka.ms/winget-manifest.version.1.6.0.schema.json

          PackageIdentifier: Provix.Provix
          PackageVersion: $tag
          DefaultLocale: en-US
          ManifestType: version
          ManifestVersion: 1.6.0
          "@ | Set-Content "$dir/Provix.Provix.yaml"

            @"
          # yaml-language-server: `$schema=https://aka.ms/winget-manifest.installer.1.6.0.schema.json

          PackageIdentifier: Provix.Provix
          PackageVersion: $tag
          MinimumOSVersion: 10.0.0.0
          InstallerType: inno
          Scope: user
          InstallModes:
          - interactive
          - silent
          - silentWithProgress
          UpgradeBehavior: install
          AppsAndFeaturesEntries:
          - DisplayName: Provix version $installerVersion
            ProductCode: 8F4E2A91-6C3D-4B8E-9F1A-2D7E5B4C9013_is1
          Installers:
          - Architecture: x64
            InstallerUrl: $($asset.browser_download_url)
            InstallerSha256: $sha
          ManifestType: installer
          ManifestVersion: 1.6.0
          "@ | Set-Content "$dir/Provix.Provix.installer.yaml"

            New-LocaleFiles $dir $tag $tag
          } else {
            $dir = "winget/Provix.Provix/1.0.2"
            if (-not (Test-Path $dir)) { throw "Manifest directory not found: $dir" }
          }

          "dir=$dir" >> $env:GITHUB_OUTPUT

      - name: Download WingetCreate
        shell: pwsh
        run: |
          $release = Invoke-RestMethod https://api.github.com/repos/microsoft/winget-create/releases/latest
          $asset = $release.assets | Where-Object { $_.name -eq 'wingetcreate.exe' } | Select-Object -First 1
          if (-not $asset) { throw "wingetcreate.exe release asset not found" }
          New-Item -ItemType Directory -Force -Path wingetcreate | Out-Null
          Invoke-WebRequest $asset.browser_download_url -OutFile wingetcreate/wingetcreate.exe

      - name: Submit to WinGet community repo
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $dir = "${{ steps.manifest.outputs.dir }}"
          $exe = Get-ChildItem wingetcreate -Recurse -Filter wingetcreate.exe | Select-Object -First 1
          if (-not $exe) { throw "wingetcreate.exe not found" }
          & $exe.FullName submit $dir `
            --package-git-repo "https://github.com/${{ github.repository }}" `
            --package-git-token "$env:GITHUB_TOKEN" `
            --pull-request-to-https://github.com/microsoft/winget-pkgs
