name: Publish to WinGet

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  winget:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare manifests
        id: manifest
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          if ($env:RELEASE_TAG) {
            $releaseTag = $env:RELEASE_TAG
            $version = $releaseTag -replace '^v', ''
            $release = Invoke-RestMethod -Uri "https://api.github.com/repos/$env:REPOSITORY/releases/tags/$releaseTag" -Headers @{ "User-Agent" = "provix-winget" }
            $asset = $release.assets | Where-Object { $_.name -like 'Provix-Setup-*.exe' } | Select-Object -First 1
            if (-not $asset) { throw "Provix-Setup-*.exe asset not found in release $releaseTag" }

            Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $asset.name
            $dir = "winget-generated/Provix.Provix/$version"
            & "$env:GITHUB_WORKSPACE/scripts/New-WingetManifest.ps1" `
              -PackageVersion $version `
              -ReleaseTag $releaseTag `
              -InstallerPath $asset.name `
              -InstallerUrl $asset.browser_download_url `
              -OutputDir $dir `
              -Repository $env:REPOSITORY
          } else {
            $dir = "winget/Provix.Provix/1.3.5"
            if (-not (Test-Path $dir)) { throw "Manifest directory not found: $dir" }
          }

          "dir=$dir" >> $env:GITHUB_OUTPUT

      - name: Upload manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: winget-manifest
          path: ${{ steps.manifest.outputs.dir }}
          if-no-files-found: error

      - name: Download WingetCreate
        shell: pwsh
        run: |
          $release = Invoke-RestMethod https://api.github.com/repos/microsoft/winget-create/releases/latest
          $asset = $release.assets | Where-Object { $_.name -eq 'wingetcreate.exe' } | Select-Object -First 1
          if (-not $asset) { throw "wingetcreate.exe release asset not found" }
          New-Item -ItemType Directory -Force -Path wingetcreate | Out-Null
          Invoke-WebRequest $asset.browser_download_url -OutFile wingetcreate/wingetcreate.exe

      - name: Validate manifest
        shell: pwsh
        run: |
          $dir = "${{ steps.manifest.outputs.dir }}"
          $exe = Get-ChildItem wingetcreate -Recurse -Filter wingetcreate.exe | Select-Object -First 1
          if (-not $exe) { throw "wingetcreate.exe not found" }

          & winget validate --manifest $dir --disable-interactivity
          if ($LASTEXITCODE -ne 0) {
            Write-Host "winget validate failed; retrying with wingetcreate..."
            & $exe.FullName validate $dir
            if ($LASTEXITCODE -ne 0) { throw "Manifest validation failed" }
          }

      - name: Submit to WinGet community repo
        shell: pwsh
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          $dir = "${{ steps.manifest.outputs.dir }}"
          $version = Split-Path $dir -Leaf
          $exe = Get-ChildItem wingetcreate -Recurse -Filter wingetcreate.exe | Select-Object -First 1
          if (-not $exe) { throw "wingetcreate.exe not found" }

          if ([string]::IsNullOrWhiteSpace($env:WINGET_TOKEN)) {
            Write-Host "::warning::WINGET_TOKEN secret is not configured. Manifest was uploaded as workflow artifact only."
            Write-Host ""
            Write-Host "To enable automatic PR submission to microsoft/winget-pkgs:"
            Write-Host "1. Create a GitHub classic PAT with the public_repo scope"
            Write-Host "2. Add it as repository secret WINGET_TOKEN"
            Write-Host "3. Re-run this workflow from Actions tab"
            exit 0
          }

          & $exe.FullName submit $dir `
            --prtitle "Provix.Provix $version" `
            --token "$env:WINGET_TOKEN"
